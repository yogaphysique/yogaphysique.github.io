<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>yogaphysique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    .hero {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

  <div class="hero">
    <video autoplay muted playsinline poster="finalframe.jpg">
      <source src="website landing.mp4" type="video/mp4">
    </video>
  </div>

</body>
</html>
