<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yogaphysique</title>

<style>
body, html {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}

.hero {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.hero video,
.hero img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero img {
  z-index: 0;
}

.hero video {
  z-index: 1;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 2;
}

.content {
  position: relative;
  z-index: 3;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  color: white;
  text-align: center;
}

h1 {
  font-size: 3rem;
  margin-bottom: 20px;
}

button {
  padding: 14px 28px;
  font-size: 16px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
  border-radius: 4px;
}
</style>
</head>

<body>

<div class="hero">

  <!-- fallback image -->
  <img src="finalframe.jpg" alt="background">

  <!-- video -->
  <video autoplay muted loop playsinline>
    <source src="website landing.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>Yogaphysique</h1>
    <button onclick="window.location.href='#'">Book a Session</button>
  </div>

</div>

</body>
</html>
