<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>yogaphysique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body, html {
      height: 100%;
    }

    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-content {
      text-align: center;
      color: white;
    }

    .hero-content h1 {
      font-size: 48px;
      font-weight: 500;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

  <section class="hero">
    <video autoplay muted playsinline poster="finalframe.jpg">
      <source src="website landing.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <div class="hero-content">
        <h1>yogaphysique</h1>
      </div>
    </div>
  </section>

</body>
</html>
